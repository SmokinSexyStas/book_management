services:
  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    container_name: php
    build: .
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    container_name: db
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: book_management_system
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql